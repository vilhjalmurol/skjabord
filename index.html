<!DOCTYPE html>
<html lang="is">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orlofshúsa mælaborð</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/ical.js@1.5.0/build/ical.min.js"></script>
    <style>
        :root {
            --bg: #0F1419;
            --surface: #161C23;
            --text-primary: #F5F5F0;
            --text-muted: rgba(245, 245, 240, 0.55);
            --text-faint: rgba(245, 245, 240, 0.30);
            --text-ghost: rgba(245, 245, 240, 0.15);
            --accent: #C9A961;
            --accent-soft: rgba(201, 169, 97, 0.18);
            --divider: rgba(245, 245, 240, 0.08);
        }

        .banner {
            display: none;
            background: var(--accent-soft);
            border-left: 3px solid var(--accent);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: clamp(14px, 1.4vw, 20px);
            font-weight: 500;
            letter-spacing: 0.01em;
            padding: 12px 20px;
            margin-bottom: 2vh;
            border-radius: 2px;
        }

        .banner.visible {
            display: block;
        }

        
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            width: 100%;
            background: var(--bg);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        body {
            display: flex;
            flex-direction: column;
            padding: 3vh 4vw;
            gap: 2vh;
        }

.body-grid {
            flex: 1;
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(360px, 28%);
            gap: 3vw;
            min-height: 0;
        }

        .main-content {
            display: flex;
            flex-direction: column;
            gap: 2vh;
            min-height: 0;
            min-width: 0;
        }

        .standings {
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .standings-header {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 4px;
        }

        .trophy-icon {
            width: clamp(20px, 1.6vw, 28px);
            height: clamp(20px, 1.6vw, 28px);
            color: var(--accent);
            flex-shrink: 0;
            margin-top: 6px;
        }

        .standings-title {
            font-family: 'Fraunces', serif;
            font-weight: 300;
            font-size: clamp(18px, 1.8vw, 26px);
            color: var(--text-primary);
            line-height: 1.1;
            letter-spacing: -0.01em;
        }

        .standings-subtitle {
            font-family: 'Fraunces', serif;
            font-style: italic;
            font-weight: 300;
            font-size: clamp(12px, 1.05vw, 15px);
            color: var(--text-muted);
            margin-top: 4px;
        }

        .standings-list {
            margin-top: 18px;
            display: flex;
            flex-direction: column;
        }

        .standings-header-row {
            display: grid;
            grid-template-columns: 28px 1fr 50px 56px;
            gap: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--divider);
        }

        .standings-header-row .col-label {
            font-family: 'Inter', sans-serif;
            font-size: clamp(9px, 0.8vw, 11px);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-faint);
        }

        .standings-header-row .col-label.right {
            text-align: right;
        }

        .standings-row {
            display: grid;
            grid-template-columns: 28px 1fr 50px 56px;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid var(--divider);
            align-items: baseline;
        }

        .standings-row:last-child {
            border-bottom: none;
        }

        .standings-pos {
            font-family: 'Fraunces', serif;
            font-weight: 300;
            font-size: clamp(16px, 1.4vw, 22px);
            color: var(--text-muted);
            line-height: 1;
        }

        .standings-row.leader .standings-pos {
            color: var(--accent);
        }

        .standings-name {
            font-family: 'Inter', sans-serif;
            font-size: clamp(13px, 1.15vw, 16px);
            color: var(--text-primary);
        }

        .standings-points {
            font-family: 'Inter', sans-serif;
            font-size: clamp(13px, 1.15vw, 16px);
            color: var(--text-primary);
            text-align: right;
            font-variant-numeric: tabular-nums;
        }

        .standings-change {
            font-family: 'Inter', sans-serif;
            font-size: clamp(12px, 1vw, 14px);
            text-align: right;
            font-variant-numeric: tabular-nums;
        }

        .standings-change.up { color: #97C459; }
        .standings-change.down { color: #E24B4A; }
        .standings-change.flat { color: var(--text-faint); }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding-bottom: 1.5vh;
            border-bottom: 1px solid var(--divider);
        }

        .header-title {
            font-family: 'Fraunces', serif;
            font-weight: 300;
            font-size: clamp(20px, 2.2vw, 32px);
            letter-spacing: 0.02em;
        }

        .clock-block {
            text-align: right;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
        }

        .clock-time {
            font-family: 'Fraunces', serif;
            font-weight: 300;
            font-size: clamp(28px, 3.2vw, 48px);
            line-height: 1;
            letter-spacing: -0.02em;
            font-variant-numeric: tabular-nums;
            display: flex;
            align-items: baseline;
            gap: 2px;
        }

        .clock-colon {
            animation: blink 2s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.35; }
        }

        .clock-date {
            font-family: 'Fraunces', serif;
            font-style: italic;
            font-weight: 300;
            font-size: clamp(13px, 1.2vw, 18px);
            color: var(--text-muted);
        }

        .metrics-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4vw;
            padding: 1vh 0;
        }

        .metric {
            text-align: center;
        }

        .metric-label {
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: clamp(11px, 1.1vw, 14px);
            color: var(--text-muted);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-bottom: 0.8vh;
        }

        .metric-value {
            font-family: 'Fraunces', serif;
            font-weight: 300;
            font-size: clamp(64px, 9vw, 140px);
            line-height: 0.9;
            letter-spacing: -0.04em;
            font-variant-numeric: tabular-nums;
        }

        .metric-sublabel {
            font-family: 'Fraunces', serif;
            font-style: italic;
            font-size: clamp(12px, 1.1vw, 16px);
            color: var(--text-faint);
            font-weight: 300;
            margin-top: 0.5vh;
        }

        .section-rule {
            display: flex;
            align-items: center;
            gap: 16px;
            color: var(--text-muted);
            font-family: 'Fraunces', serif;
            font-style: italic;
            font-weight: 300;
            font-size: clamp(13px, 1.3vw, 18px);
            letter-spacing: 0.05em;
        }

        .section-rule::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--divider);
        }

        .ribbon {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            flex: 1;
            min-height: 0;
        }

        .day {
            display: flex;
            flex-direction: column;
            min-height: 0;
            position: relative;
        }

        .day.empty {
            opacity: 0.4;
        }

        .day-header {
            border-top: 1px solid var(--divider);
            padding-top: 8px;
            margin-bottom: 8px;
            min-height: 60px;
        }

        .day.today .day-header {
            border-top: 1px solid var(--accent);
        }

        .day-weekday {
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: clamp(9px, 0.85vw, 11px);
            color: var(--text-muted);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 2px;
        }

        .day.today .day-weekday {
            color: var(--accent);
        }

        .day-number {
            font-family: 'Fraunces', serif;
            font-weight: 300;
            font-size: clamp(22px, 2.4vw, 36px);
            line-height: 1;
            letter-spacing: -0.03em;
        }

        .day-month {
            font-family: 'Fraunces', serif;
            font-style: italic;
            font-weight: 300;
            font-size: clamp(10px, 0.95vw, 13px);
            color: var(--text-faint);
            margin-top: 2px;
        }

        .events {
            display: flex;
            flex-direction: column;
            gap: 6px;
            overflow: hidden;
        }

        .event {
            padding: 8px 10px;
            background: var(--surface);
            border-left: 2px solid var(--accent);
            border-radius: 2px;
        }

        .day.today .event {
            background: var(--accent-soft);
        }

        .event-time {
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: clamp(9px, 0.85vw, 11px);
            color: var(--text-muted);
            letter-spacing: 0.08em;
            margin-bottom: 2px;
        }

        .event-title {
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            font-size: clamp(11px, 1.05vw, 14px);
            line-height: 1.3;
            color: var(--text-primary);
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
        }

        .tasks {
            padding: 12px 0;
            display: flex;
            flex-direction: column;
        }

        .task-header {
            display: grid;
            grid-template-columns: 2.4fr 1fr 1fr 0.9fr;
            gap: 24px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--divider);
        }

        .task-header .col-label {
            font-family: 'Inter', sans-serif;
            font-size: clamp(9px, 0.85vw, 11px);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-faint);
        }

        .task-row {
            display: grid;
            grid-template-columns: 2.4fr 1fr 1fr 0.9fr;
            gap: 24px;
            padding: 14px 0;
            border-bottom: 1px solid var(--divider);
            align-items: baseline;
        }

        .task-row:last-child {
            border-bottom: none;
        }

        .task-name {
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            font-size: clamp(15px, 1.4vw, 18px);
            color: var(--text-primary);
            margin-bottom: 3px;
        }

        .task-project {
            font-family: 'Fraunces', serif;
            font-style: italic;
            font-size: clamp(11px, 1vw, 12px);
            color: var(--text-faint);
        }

        .task-meta {
            font-family: 'Inter', sans-serif;
            font-size: clamp(12px, 1.1vw, 14px);
            color: var(--text-muted);
        }

        .task-meta.empty {
            color: var(--text-faint);
        }
        
        .loading {
            grid-column: 1 / -1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-faint);
            font-family: 'Fraunces', serif;
            font-style: italic;
            font-size: 14px;
        }

        .footer {
            padding-top: 1.5vh;
            border-top: 1px solid var(--divider);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: clamp(10px, 0.9vw, 12px);
            color: var(--text-faint);
        }

        .footer-brand {
            font-family: 'Fraunces', serif;
            font-style: italic;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>
    <div class="banner" id="banner"></div>
    
    <header class="header">
        <div class="header-title">Orlofsdeild</div>
        <div class="clock-block">
            <div class="clock-time">
                <span id="clock-hours">--</span><span class="clock-colon">:</span><span id="clock-minutes">--</span>
            </div>
            <div class="clock-date" id="clock-date">—</div>
        </div>
    </header>


   <div class="body-grid">

      <div class="main-content">

        <div class="section-rule">Næsta vika</div>
        <div class="ribbon" id="ribbon">
            <div class="loading">Sæki dagatal…</div>
        </div>

        <div class="section-rule">Verkefni</div>
        <div class="tasks" id="tasks">
            <div class="loading">Sæki verkefni…</div>
        </div>

      </div>

      <aside class="standings">
        <div class="standings-header">
            <svg class="trophy-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M8 21h8M12 17v4M7 4h10v5a5 5 0 0 1-10 0V4z"/>
                <path d="M17 5h2a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-2M7 5H5a2 2 0 0 0-2 2 2 2 0 0 0 2 2h2"/>
            </svg>
            <div>
                <div class="standings-title">Sameyki — rauðvínsdeildin</div>
                <div class="standings-subtitle">HM í fótbolta — 2026</div>
            </div>
        </div>
        <div class="standings-list" id="standings">
            <div class="loading">Sæki stöðu…</div>
        </div>
      </aside>

    </div>

    <footer class="footer">
        <span class="footer-brand">Mælaborð</span>
        <span id="last-sync">—</span>
    </footer>

    <script>
        const BANNER_TEXT = "";
        
        const ICAL_URL = "https://calendar.google.com/calendar/ical/5d7b58f3403ff282b71178d6ef86024ab4c96457e2297abebc10f4dd2446aedc%40group.calendar.google.com/private-412178fd8edb868d6f055e06fcec46fd/basic.ics";

        const TASKS_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSwtFB5_W-JlVRw_jYBh_R_IUPDkxQBLXjonQP15fooMLrr6arOOs_AB9mugjr_o5c4fsuHfD3TB7yP/pub?gid=0&single=true&output=csv";

        const STANDINGS_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSRhwgORQZO_ILl6pNzy5-kSNSBor0S6ILKX7L6brQh9uARoMQb_EZFmDn5tCQGvy_e6XCEXaZ07Sfs/pub?output=csv";
        
        const WEEKDAYS_IS = ['Sun', 'Mán', 'Þri', 'Mið', 'Fim', 'Fös', 'Lau'];
        const MONTHS_IS = ['jan', 'feb', 'mar', 'apr', 'maí', 'jún', 'júl', 'ágú', 'sep', 'okt', 'nóv', 'des'];

        function updateClock() {
            const now = new Date();
            const hh = String(now.getHours()).padStart(2, '0');
            const mm = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('clock-hours').textContent = hh;
            document.getElementById('clock-minutes').textContent = mm;

            const dateStr = now.toLocaleDateString('is-IS', { weekday: 'long', day: 'numeric', month: 'long' });
            document.getElementById('clock-date').textContent = dateStr.charAt(0).toUpperCase() + dateStr.slice(1);
        }

        function sameDay(a, b) {
            return a.getFullYear() === b.getFullYear() &&
                   a.getMonth() === b.getMonth() &&
                   a.getDate() === b.getDate();
        }

        function formatTime(date) {
            return String(date.getHours()).padStart(2, '0') + ':' + String(date.getMinutes()).padStart(2, '0');
        }

        async function loadCalendar() {
            const ribbon = document.getElementById('ribbon');

            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const days = [];
            for (let i = 0; i < 7; i++) {
                const d = new Date(today);
                d.setDate(d.getDate() + i);
                days.push({ date: d, events: [] });
            }

            if (!ICAL_URL || ICAL_URL === "PASTE_YOUR_ICAL_URL_HERE") {
                renderRibbon(days);
                return;
            }

            try {
                const proxyUrl = 'https://corsproxy.io/?url=' + encodeURIComponent(ICAL_URL);
                const response = await fetch(proxyUrl);
                if (!response.ok) throw new Error('Network error');
                const text = await response.text();

                const jcalData = ICAL.parse(text);
                const comp = new ICAL.Component(jcalData);
                const vevents = comp.getAllSubcomponents('vevent');

                const windowEnd = new Date(today);
                windowEnd.setDate(windowEnd.getDate() + 7);

                vevents.forEach(vevent => {
                    const event = new ICAL.Event(vevent);
                    const start = event.startDate.toJSDate();
                    if (start >= today && start < windowEnd) {
                        const dayIndex = Math.floor((start - today) / (1000 * 60 * 60 * 24));
                        if (dayIndex >= 0 && dayIndex < 7) {
                            days[dayIndex].events.push({
                                start: start,
                                title: event.summary || '(ónefnt)',
                                allDay: event.startDate.isDate
                            });
                        }
                    }
                });

                days.forEach(day => {
                    day.events.sort((a, b) => a.start - b.start);
                });

                renderRibbon(days);
                document.getElementById('last-sync').textContent =
                    'Dagatal samstillt ' + formatTime(new Date());
            } catch (err) {
                console.error('Calendar load failed:', err);
                renderRibbon(days);
                document.getElementById('last-sync').textContent = 'Dagatal ekki tiltækt';
            }
        }

function parseCSV(text) {
            const rows = [];
            let row = [], field = '', inQuotes = false;
            for (let i = 0; i < text.length; i++) {
                const c = text[i], next = text[i + 1];
                if (inQuotes) {
                    if (c === '"' && next === '"') { field += '"'; i++; }
                    else if (c === '"') { inQuotes = false; }
                    else { field += c; }
                } else {
                    if (c === '"') { inQuotes = true; }
                    else if (c === ',') { row.push(field); field = ''; }
                    else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
                    else if (c === '\r') { /* skip */ }
                    else { field += c; }
                }
            }
            if (field.length > 0 || row.length > 0) { row.push(field); rows.push(row); }
            return rows;
        }

        async function loadTasks() {
            const container = document.getElementById('tasks');

            if (!TASKS_CSV_URL || TASKS_CSV_URL === "PASTE_YOUR_TASKS_CSV_URL_HERE") {
                container.innerHTML = '<div class="loading">Engin verkefnaslóð stillt</div>';
                return;
            }

            try {
                const response = await fetch(TASKS_CSV_URL);
                if (!response.ok) throw new Error('Network error');
                const text = await response.text();

                const rows = parseCSV(text);
                if (rows.length < 2) {
                    container.innerHTML = '<div class="loading">Engin verkefni</div>';
                    return;
                }

                const headers = rows[0];
                const tasks = rows.slice(1).filter(r => r.some(cell => cell.trim() !== ''));

               container.innerHTML = '';

                const header = document.createElement('div');
                header.className = 'task-header';
                ['Verkefni', 'Staða', 'Frestur', 'Forgangur'].forEach(text => {
                    const label = document.createElement('div');
                    label.className = 'col-label';
                    label.textContent = text;
                    header.appendChild(label);
                });
                container.appendChild(header);

                tasks.forEach(task => {
                    const verkefni = (task[0] || '').trim();
                    const flokkur = (task[1] || '').trim();
                    const stada = (task[2] || '').trim();
                    const frestur = (task[3] || '').trim();
                    const forgangur = (task[4] || '').trim();

                    const rowEl = document.createElement('div');
                    rowEl.className = 'task-row';

                    const nameCell = document.createElement('div');
                    const nameEl = document.createElement('div');
                    nameEl.className = 'task-name';
                    nameEl.textContent = verkefni || '—';
                    nameCell.appendChild(nameEl);
                    if (flokkur) {
                        const projEl = document.createElement('div');
                        projEl.className = 'task-project';
                        projEl.textContent = flokkur;
                        nameCell.appendChild(projEl);
                    }
                    rowEl.appendChild(nameCell);

                    [stada, frestur, forgangur].forEach(val => {
                        const cell = document.createElement('div');
                        cell.className = 'task-meta' + (val ? '' : ' empty');
                        cell.textContent = val || '—';
                        rowEl.appendChild(cell);
                    });

                    container.appendChild(rowEl);
                });
            } catch (err) {
                console.error('Task load failed:', err);
                container.innerHTML = '<div class="loading">Verkefni ekki tiltæk</div>';
            }
        }

async function loadStandings() {
            const container = document.getElementById('standings');

            if (!STANDINGS_CSV_URL || STANDINGS_CSV_URL === "PASTE_YOUR_STANDINGS_CSV_URL_HERE") {
                container.innerHTML = '<div class="loading">Engin stöðuslóð stillt</div>';
                return;
            }

            try {
                const response = await fetch(STANDINGS_CSV_URL);
                if (!response.ok) throw new Error('Network error');
                const text = await response.text();

                const rows = parseCSV(text);
                if (rows.length < 2) {
                    container.innerHTML = '<div class="loading">Engin staða</div>';
                    return;
                }

                const standings = rows.slice(1).filter(r => r.some(cell => cell.trim() !== ''));

                container.innerHTML = '';

                const header = document.createElement('div');
                header.className = 'standings-header-row';
                ['#', 'Nafn', 'Stig', 'Breyting'].forEach((text, idx) => {
                    const label = document.createElement('div');
                    label.className = 'col-label' + (idx >= 2 ? ' right' : '');
                    label.textContent = text;
                    header.appendChild(label);
                });
                container.appendChild(header);

                standings.forEach((row, idx) => {
                    const saeti = (row[0] || '').trim();
                    const nafn = (row[1] || '').trim();
                    const stig = (row[2] || '').trim();
                    const breyting = (row[3] || '').trim();

                    const rowEl = document.createElement('div');
                    rowEl.className = 'standings-row' + (idx === 0 ? ' leader' : '');

                    const posEl = document.createElement('div');
                    posEl.className = 'standings-pos';
                    posEl.textContent = saeti || (idx + 1);
                    rowEl.appendChild(posEl);

                    const nameEl = document.createElement('div');
                    nameEl.className = 'standings-name';
                    nameEl.textContent = nafn || '—';
                    rowEl.appendChild(nameEl);

                    const pointsEl = document.createElement('div');
                    pointsEl.className = 'standings-points';
                    pointsEl.textContent = stig || '0';
                    rowEl.appendChild(pointsEl);

                    const changeEl = document.createElement('div');
                    const num = parseFloat(breyting.replace(',', '.').replace('−', '-'));
                    let cls = 'flat';
                    let display = '0';
                    if (!isNaN(num) && num > 0) { cls = 'up'; display = '+' + num; }
                    else if (!isNaN(num) && num < 0) { cls = 'down'; display = '−' + Math.abs(num); }
                    changeEl.className = 'standings-change ' + cls;
                    changeEl.textContent = display;
                    rowEl.appendChild(changeEl);

                    container.appendChild(rowEl);
                });
            } catch (err) {
                console.error('Standings load failed:', err);
                container.innerHTML = '<div class="loading">Staða ekki tiltæk</div>';
            }
        }

        
        function renderRibbon(days) {
            const ribbon = document.getElementById('ribbon');
            ribbon.innerHTML = '';
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            days.forEach(day => {
                const isToday = sameDay(day.date, today);
                const isEmpty = day.events.length === 0;

                const dayEl = document.createElement('div');
                dayEl.className = 'day' + (isToday ? ' today' : '') + (isEmpty && !isToday ? ' empty' : '');

                const header = document.createElement('div');
                header.className = 'day-header';

                const weekday = document.createElement('div');
                weekday.className = 'day-weekday';
                weekday.textContent = isToday ? 'Í DAG' : WEEKDAYS_IS[day.date.getDay()];
                header.appendChild(weekday);

                const number = document.createElement('div');
                number.className = 'day-number';
                number.textContent = day.date.getDate();
                header.appendChild(number);

                const month = document.createElement('div');
                month.className = 'day-month';
                month.textContent = MONTHS_IS[day.date.getMonth()];
                header.appendChild(month);

                dayEl.appendChild(header);

                const events = document.createElement('div');
                events.className = 'events';

                day.events.forEach(ev => {
                    const eventEl = document.createElement('div');
                    eventEl.className = 'event';

                    if (!ev.allDay) {
                        const time = document.createElement('div');
                        time.className = 'event-time';
                        time.textContent = formatTime(ev.start);
                        eventEl.appendChild(time);
                    }

                    const title = document.createElement('div');
                    title.className = 'event-title';
                    title.textContent = ev.title;
                    eventEl.appendChild(title);

                    events.appendChild(eventEl);
                });

                dayEl.appendChild(events);
                ribbon.appendChild(dayEl);
            });
        }
const bannerEl = document.getElementById('banner');
        if (BANNER_TEXT && BANNER_TEXT.trim() !== "") {
            bannerEl.textContent = BANNER_TEXT;
            bannerEl.classList.add('visible');
        }
        
        updateClock();
        setInterval(updateClock, 1000);

        loadCalendar();
        setInterval(loadCalendar, 15 * 60 * 1000);

        loadTasks();
        setInterval(loadTasks, 15 * 60 * 1000);

        loadStandings();
        setInterval(loadStandings, 15 * 60 * 1000);
        
        setTimeout(() => location.reload(), 60 * 60 * 1000);
    </script>
</body>
</html>
